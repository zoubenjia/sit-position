name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from pyproject.toml
        id: ver
        run: |
          VERSION=$(python3 -c "
          import re
          with open('pyproject.toml') as f:
              m = re.search(r'version\s*=\s*\"([^\"]+)\"', f.read())
              print(m.group(1))
          ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if tag already exists
        id: check
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "::notice::Tag $TAG already exists, skipping release"
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "::notice::New version $TAG, will build and release"
          fi

  build-macos:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download ML models
        run: |
          curl -sLO https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/latest/pose_landmarker_lite.task
          curl -sLO https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task

      - name: Build macOS app
        run: python -m PyInstaller SitMonitor.spec --noconfirm

      - name: Create DMG
        run: |
          hdiutil create -volname "SitMonitor" \
            -srcfolder dist/SitMonitor.app \
            -ov -format UDZO \
            dist/SitMonitor-macOS.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: SitMonitor-macOS
          path: dist/SitMonitor-macOS.dmg

  build-windows:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download ML models
        run: |
          Invoke-WebRequest -Uri "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/latest/pose_landmarker_lite.task" -OutFile "pose_landmarker_lite.task"
          Invoke-WebRequest -Uri "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task" -OutFile "face_landmarker.task"

      - name: Generate .ico icon
        run: |
          python -c "
          from PIL import Image; import os
          src = 'build-resources/SitMonitor.png'
          dst = 'build-resources/SitMonitor.ico'
          if os.path.exists(src) and not os.path.exists(dst):
              img = Image.open(src)
              img.save(dst, format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          "
        continue-on-error: true

      - name: Build Windows exe
        run: python -m PyInstaller SitMonitor_win.spec --noconfirm

      - name: Create zip
        run: Compress-Archive -Path dist\SitMonitor -DestinationPath dist\SitMonitor-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: SitMonitor-Windows
          path: dist/SitMonitor-Windows.zip

  release:
    needs: [check-version, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          VERSION="${{ needs.check-version.outputs.version }}"

          # 创建并推送 tag
          git tag "$TAG"
          git push origin "$TAG"

          # 创建 GitHub Release
          gh release create "$TAG" \
            artifacts/SitMonitor-macOS/SitMonitor-macOS.dmg \
            artifacts/SitMonitor-Windows/SitMonitor-Windows.zip \
            --title "SitMonitor $TAG" \
            --generate-notes
