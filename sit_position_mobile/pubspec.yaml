name: sit_position_mobile
description: 手机端坐姿监控 — 低头族检测
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sensors_plus: ^4.0.0
  flutter_local_notifications: ^17.0.0
  audioplayers: ^6.0.0
  shared_preferences: ^2.2.0
  vibration: ^2.0.0
  cupertino_icons: ^1.0.6
  camera: ^0.11.0+2
  google_mlkit_face_detection: ^0.12.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
